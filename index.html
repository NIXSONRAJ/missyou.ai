<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>missyou.ai — CS Mentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="onboardingModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h2>Welcome to missyou.ai ✨</h2>
        <p>Configure your AI Engine. Supports OpenRouter, Groq, or Local APIs (Ollama/LM Studio).</p>
        
        <div class="form-group">
            <label>API Base URL</label>
            <input type="text" id="apiUrlInput" value="https://openrouter.ai/api/v1">
        </div>
        <div class="form-group">
            <label>Model Name</label>
            <input type="text" id="apiModelInput" value="google/gemini-2.0-flash-001">
        </div>
        <div class="form-group">
            <label>API Key (Leave blank for local servers)</label>
            <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
        </div>
        
        <button onclick="submitConfig()" class="save-key-btn" id="saveBtn">Verify & Initialize</button>
        <p id="keyError" style="color: #ff4444; display: none; font-size: 0.85rem; margin-top: 10px;"></p>
    </div>
</div>

<div class="app-layout">
    <aside class="sidebar">
        <div class="logo-area">
            <h2>missyou.ai ✨</h2>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">+ New Conversation</button>
        
        <div class="sidebar-footer" style="margin-top: auto; font-size: 0.75rem; color: #444; text-align: center;">
            v1.0.0 Stable Build
        </div>
    </aside>

    <main class="chat-container">
        <div class="chat-history" id="chat">
            </div>
        
        <div class="input-area">
            <div class="input-wrapper">
                <input type="file" id="fileInput" style="display: none;" onchange="handleFileUpload(event)">
                
                <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Upload PDF or Code File">
                    </button>
                
                <textarea id="userInput" placeholder="Ask your mentor anything..." onkeypress="handleEnter(event)"></textarea>
                
                <button class="send-btn" onclick="sendMsg()" title="Send Message">
                    </button>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>

</body>
</html>
